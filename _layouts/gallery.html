---
layout: default
---

<h1>My Art</h1>
<div class="art-grid">
  {% for art in site.data.artworks %}
  <div class="art-item">
    <a href="{{ art.url }}">
      <img src="{{ art.url }}" alt="{{ art.title }}" />
      <div class="overlay">
        <span>{{ art.title }}</span>
      </div>
    </a>
  </div>
  {% endfor %}
</div>

<style>
  .art-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
  }

  .art-item {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
  }

  .art-item img {
    width: 100%;
    height: auto; /* keeps aspect ratio */
    display: block;
    transition: transform 0.3s ease;
  }

  .art-item:hover img {
    transform: scale(1.05); /* slight zoom on hover */
  }

  .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0));
    color: #fff;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 5px;
    box-sizing: border-box;
    opacity: 0;
    transition: opacity 0.3s ease, height 0.3s ease;
  }

  .art-item:hover .overlay {
    height: 40%;
    opacity: 1;
  }

  .overlay span {
    font-size: 0.9rem;
    text-align: center;
  }
</style>
