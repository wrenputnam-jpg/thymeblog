---
layout: default
---

<h1>My Art</h1>
<div class="art-grid">
  {% for art in site.data.artworks %}
  <div class="art-item">
    <a href="{{ art.url }}" title="{{ art.title }}">
      <img src="{{ art.url }}" alt="{{ art.title }}" />
    </a>
    <p>{{ art.title }}</p>
  </div>
  {% endfor %}
</div>

<style>
  .art-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
  }
  .art-item img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
  }
  .art-item p {
    text-align: center;
    margin-top: 5px;
    font-size: 0.9rem;
  }
</style>
